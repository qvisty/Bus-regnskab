name: CI

# Kører typecheck, tests og build ved push og pull requests.
on:
  push:
    branches: [main, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests
        run: npm test
      - name: Build (produktion)
        run: npm run build
      - name: Build (demo)
        run: npm run build:demo
