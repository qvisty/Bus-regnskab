name: Deploy demo til GitHub Pages

# Bygger den statiske demo-udgave (localStorage, ingen backend) og
# udgiver den på GitHub Pages. Kører ved push til hovedbranchen og kan
# startes manuelt.
on:
  push:
    branches: [main, claude/vue-web-app-conversion-gt4y6]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Kun én Pages-deploy ad gangen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
